<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Examen</title>
    <link rel="stylesheet" href="estilos.css" />
  </head>
  <body>
    <h2>Formulario de saludo</h2>
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" />
    <label for="apellido">Apellido:</label>
    <input type="text" id="apellido" />
    <button onclick="saludar()">Enviar</button>

    <!--ej 2-->

    <div class="fondo"></div>
    <div class="coloresconjunto">
      <div class="rojo"><button>rojo</button></div>
      <div class="verde"><button>amarillo</button></div>
      <div class="azul"><button>azul</button></div>
    </div>

    <script>
      function saludar() {
        const nombre = document.querySelector("#nombre").value;
        const apellido = document.querySelector("#apellido").value;

        const mensaje = "Buenos días " + nombre + " " + apellido;

        console.log(mensaje);
        alert(mensaje);
      }

      //ej 2
    </script>
  </body>
</html>
