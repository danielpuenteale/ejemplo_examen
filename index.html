<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Examen</title>
  </head>
  <body>
    <h2>Formulario de saludo</h2>
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" placeholder="" />
    <label for="apellido">Apellido:</label>
    <input type="text" id="apellido" placeholder="" />
    <button onclick="saludar()">Enviar</button>

    <script>
      function saludar() {
        const nombre = document.querySelector("#nombre").value;
        const apellido = document.querySelector("#apellido").value;

        const mensaje = "Buenos días " + nombre + " " + apellido;

        console.log(mensaje);
        alert(mensaje);
      }
    </script>
  </body>
</html>
