<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #caja {
        width: 100px;
        height: 100px;
        background: green; /* color inicial */
        margin-bottom: 10px; /* separa el div de los botones */
      }

      button {
        margin: 5px;
        padding: 5px 10px;
      }
      #resultado {
        margin-top: 10px;
        font-weight: bold;
      }
      #resultado {
        margin-top: 10px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Ejercicio 1</h1>
    <input type="text" id="nombre" placeholder="Nombre" />
    <input type="text" id="apellido" placeholder="Apellido" />
    <button onclick="saludar()">Saludar</button>

    <h1>Ejercicio 2</h1>
    <div id="caja"></div>
    <button onclick="cambiarColor('red')">Rojo</button>
    <button onclick="cambiarColor('yellow')">Amarillo</button>
    <button onclick="cambiarColor('green')">Verde</button>

    <h1>Ejercicio 3</h1>
    <input type="number" id="nota1" placeholder="Nota 1" />
    <input type="number" id="nota2" placeholder="Nota 2" />
    <input type="number" id="nota3" placeholder="Nota 3" />
    <br />
    <button onclick="calcular()">Calcular media</button>
    <div id="resultado"></div>

    <h1>Ejercicio 4</h1>
    <input type="number" id="nota1" placeholder="Nota 1" />
    <input type="number" id="nota2" placeholder="Nota 2" />
    <input type="number" id="nota3" placeholder="Nota 3" />
    <br />
    <button onclick="calcular()">Calcular media</button>
    <div id="resultado"></div>

    <script>
      function saludar() {
        let nombre = document.getElementById("nombre").value;
        let apellido = document.getElementById("apellido").value;
        let texto = "Buenos dias " + nombre + " " + apellido;
        console.log(texto);
        alert(texto);
      }

      function cambiarColor(color) {
        document.getElementById("caja").style.background = color;
      }

      function calcular() {
        let n1 = Number(document.getElementById("nota1").value);
        let n2 = Number(document.getElementById("nota2").value);
        let n3 = Number(document.getElementById("nota3").value);

        let media = (n1 + n2 + n3) / 3;

        document.getElementById("resultado").innerHTML = media;
      }
      function calcular() {
        // Obtener las notas y convertir a número
        let n1 = Number(document.getElementById("nota1").value);
        let n2 = Number(document.getElementById("nota2").value);
        let n3 = Number(document.getElementById("nota3").value);

        // Calcular la media
        let media = (n1 + n2 + n3) / 3;

        // Mostrar mensaje según media
        if (media < 5) {
          document.getElementById("resultado").innerHTML =
            "4 - La media es menor de 5, hay que aprobar los tres trimestres";
        } else {
          document.getElementById("resultado").innerHTML =
            "¡Todo aprobado! La media es: " + media.toFixed(2);
        }
      }
    </script>
  </body>
</html>
